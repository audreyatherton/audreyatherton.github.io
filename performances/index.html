<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performances — Audrey Atherton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Mrs+Saint+Delafield&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F4F8FB;
      --bg2: #EBF2F7;
      --border: rgba(150,185,210,0.3);
      --accent: #7BADC8;
      --accent-deep: #4A86A8;
      --text: #2C3E4A;
      --muted: #8AA5B5;
      --script: 'Mrs Saint Delafield', cursive;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Lato', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.25rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(244,248,251,0.93);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-name { font-family: var(--script); font-size: 1.9rem; color: var(--accent-deep); text-decoration: none; line-height: 1; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: var(--sans); font-size: 0.7rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent-deep); }
    .nav-links a.active { color: var(--accent-deep); }

    .page-inner { max-width: 820px; margin: 0 auto; padding: 7rem 2rem 6rem; animation: fadeIn 0.5s ease both; }
    .page-header { margin-bottom: 3rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .page-header h1 { font-family: var(--script); font-size: 3.5rem; font-weight: 400; color: var(--accent-deep); line-height: 1; }

    .perf-grid { display: flex; flex-direction: column; gap: 2.5rem; }
    .perf-label { font-size: 0.65rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .perf-title { font-family: var(--serif); font-size: 1.1rem; font-style: italic; font-weight: 300; color: var(--text); margin-bottom: 0.85rem; }
    .video-wrap { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 8px; overflow: hidden; background: var(--bg2); }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    .page-footer { text-align: center; padding: 2rem; font-family: var(--script); font-size: 1.4rem; color: var(--muted); border-top: 1px solid var(--border); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .page-inner { padding: 5rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-name">Audrey Atherton</a>
    <ul class="nav-links">
      <li><a href="/performances" class="active">Performances</a></li>
      <li><a href="/bio">Bio</a></li>
    </ul>
  </nav>

  <div class="page-inner">
    <div class="page-header">
      <h1>Performances</h1>
    </div>
    <div class="perf-grid">
      <div>
        <p class="perf-label">01</p>
        <p class="perf-title">Dvořák — Cello Concerto, Mvt. II</p>
        <div class="video-wrap">
          <iframe src="https://www.youtube.com/embed/gPU4YTj_UC0" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
      <div>
        <p class="perf-label">02</p>
        <p class="perf-title">Britten — Cello Suite No. 1</p>
        <div class="video-wrap">
          <iframe src="https://www.youtube.com/embed/yHeYCmCi3wk" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
      <div>
        <p class="perf-label">03</p>
        <p class="perf-title">Bottermund-Starker — Variations on a Theme of Paganini</p>
        <div class="video-wrap">
          <iframe src="https://www.youtube.com/embed/qx8FvqY09qc" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </div>
  <div class="page-footer">Audrey Atherton</div>
</body>
</html>
