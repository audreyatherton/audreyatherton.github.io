<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audrey Atherton — Cellist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Mrs+Saint+Delafield&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F4F8FB;
      --bg2: #EBF2F7;
      --border: rgba(150,185,210,0.3);
      --accent: #7BADC8;
      --accent-deep: #4A86A8;
      --text: #2C3E4A;
      --muted: #8AA5B5;
      --script: 'Mrs Saint Delafield', cursive;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Lato', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.25rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(244,248,251,0.93);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-name { font-family: var(--script); font-size: 1.9rem; color: var(--accent-deep); text-decoration: none; line-height: 1; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: var(--sans); font-size: 0.7rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent-deep); }

    .home-hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: flex-end; justify-content: flex-start;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-color: var(--bg2);
      background-image: url('silvercellocrop.jpeg');
      background-size: cover; background-position: center top; z-index: 0;
    }
    .hero-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 30%, #F4F8FB 75%), linear-gradient(to top, #F4F8FB 0%, transparent 30%);
      z-index: 2;
    }
    .hero-content {
      position: relative; z-index: 3;
      padding: 0 5% 6rem 5%; width: 100%;
      display: flex; flex-direction: column; align-items: flex-end; text-align: right;
      animation: fadeIn 1.1s ease both;
    }
    .home-tag { font-family: var(--serif); font-size: 0.9rem; font-style: italic; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.5rem; font-weight: 300; }
    .home-hero h1 { font-family: var(--script); font-size: clamp(4rem, 9vw, 8rem); font-weight: 400; color: var(--text); line-height: 1.05; margin-bottom: 0.5rem; }
    .home-location { font-size: 0.68rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; }
    .home-actions { display: flex; gap: 1rem; }
    .btn { display: inline-block; font-family: var(--sans); font-size: 0.68rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; padding: 0.75rem 1.75rem; cursor: pointer; transition: all 0.2s; border-radius: 30px; }
    .btn-outline { border: 1px solid var(--accent); color: var(--accent-deep); }
    .btn-outline:hover { background: var(--accent); color: #fff; }
    .btn-ghost { border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .hero-content { align-items: flex-start; text-align: left; padding: 0 1.5rem 4rem; }
      .hero-fade { background: linear-gradient(to top, #F4F8FB 0%, transparent 40%), linear-gradient(to right, transparent 0%, rgba(244,248,251,0.5) 100%); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-name">Audrey Atherton</a>
    <ul class="nav-links">
      <li><a href="/performances">Performances</a></li>
      <li><a href="/bio">Bio</a></li>
    </ul>
  </nav>

  <div class="home-hero">
    <div class="hero-bg"></div>
    <div class="hero-fade"></div>
    <div class="hero-content">
      <p class="home-tag">cellist</p>
      <h1>Audrey Atherton</h1>
      <p class="home-location">North Carolina</p>
      <div class="home-actions">
        <a href="/performances" class="btn btn-outline">Performances</a>
        <a href="/bio" class="btn btn-ghost">Bio</a>
      </div>
    </div>
  </div>
</body>
</html>
